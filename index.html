<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Семейный чат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0e1621; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .app { width: 100%; max-width: 1200px; height: 90vh; background: #17212b; border-radius: 12px; display: flex; overflow: hidden; }
        .sidebar { width: 280px; background: #17212b; border-right: 1px solid #242f3d; display: flex; flex-direction: column; }
        .user-info { padding: 20px; background: #1f2a36; border-bottom: 1px solid #242f3d; }
        .user-name { color: white; font-weight: bold; font-size: 18px; }
        .online-status { color: #6abf4b; font-size: 12px; margin-top: 5px; }
        .chats-header { padding: 15px; color: #7e8c9e; font-size: 12px; }
        .users-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #242f3d; }
        .user-item:hover { background: #1f2a36; }
        .user-item.active { background: #2b5270; }
        .user-name-small { color: white; font-size: 14px; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0e1621; }
        .chat-header { padding: 15px 20px; background: #17212b; border-bottom: 1px solid #242f3d; color: white; font-weight: bold; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 65%; padding: 8px 12px; border-radius: 12px; }
        .message.other { background: #17212b; align-self: flex-start; color: white; }
        .message.self { background: #2b5270; align-self: flex-end; color: white; }
        .message-info { font-size: 11px; color: #7e8c9e; margin-top: 4px; }
        .typing-indicator { padding: 10px 20px; color: #7e8c9e; font-size: 12px; font-style: italic; }
        .input-area { display: flex; gap: 10px; padding: 15px; background: #17212b; border-top: 1px solid #242f3d; }
        .input-area input { flex: 1; padding: 10px 15px; background: #242f3d; border: none; border-radius: 20px; color: white; outline: none; }
        .input-area button { background: #2b5270; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        .status-badge { font-size: 12px; padding: 4px 8px; border-radius: 12px; margin-left: 10px; }
        .status-connected { background: #2e7d32; color: white; }
        .status-connecting { background: #ed6c02; color: white; }
        .status-disconnected { background: #d32f2f; color: white; }
        @media (max-width: 700px) { .sidebar { width: 80px; } .user-name-small, .chats-header { display: none; } }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="user-info">
            <div class="user-name" id="myName">...</div>
            <div class="online-status">● Онлайн</div>
        </div>
        <div class="chats-header">Чаты</div>
        <div class="users-list" id="usersList"></div>
    </div>
    <div class="chat-area">
        <div class="chat-header" id="chatHeader">
            Общий чат
            <span id="connectionStatus" class="status-badge status-connecting">🔌 Подключение...</span>
        </div>
        <div class="messages" id="messages"></div>
        <div class="typing-indicator" id="typingIndicator" style="display:none"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Сообщение...">
            <button onclick="sendMessage()">📤</button>
        </div>
    </div>
</div>
<script>
    let ws = null;
    let myName = localStorage.getItem("name");
    if(!myName){ myName = prompt("Ваше имя:"); localStorage.setItem("name", myName); }
    document.getElementById("myName").innerText = myName;
    
    let currentChat = "all";
    let typingTimeout = null;
    let reconnectAttempts = 0;
    let reconnectTimer = null;
    
    // WebSocket адрес
    const WS_URL = "wss://chat-production-1b03.up.railway.app";
    
    function updateConnectionStatus(status, text) {
        const badge = document.getElementById("connectionStatus");
        badge.innerText = text;
        badge.className = "status-badge status-" + status;
    }
    
    function connect() {
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
            console.log("WebSocket уже открыт или открывается");
            return;
        }
        
        updateConnectionStatus("connecting", "🔌 Подключение...");
        console.log("Подключение к " + WS_URL);
        
        try {
            ws = new WebSocket(WS_URL);
            
            ws.onopen = () => {
                console.log("✅ WebSocket открыт");
                reconnectAttempts = 0;
                updateConnectionStatus("connected", "✅ Соединение установлено");
                ws.send(JSON.stringify({type: "register", username: myName}));
            };
            
            ws.onmessage = (e) => {
                try {
                    let data = JSON.parse(e.data);
                    console.log("Получено:", data);
                    
                    if(data.type === "users_list") {
                        updateUsers(data.users);
                    } else if(data.type === "public" && (currentChat === "all" || currentChat === data.from)) {
                        addMsg(data.from, data.text, false, data.time);
                    } else if(data.type === "private" && (currentChat === data.from || currentChat === myName)) {
                        addMsg(data.from, data.text, false, data.time);
                    } else if(data.type === "typing" && currentChat === data.from) {
                        showTyping(data.from);
                    } else if(data.type === "info") {
                        addInfo(data.text);
                    }
                } catch(err) {
                    console.error("Ошибка парсинга сообщения:", err);
                }
            };
            
            ws.onclose = (event) => {
                console.log("❌ WebSocket закрыт, код:", event.code, "причина:", event.reason);
                updateConnectionStatus("disconnected", "🔴 Соединение потеряно");
                addInfo("🔴 Потеря связи. Переподключение...");
                
                // Автоматическое переподключение с увеличивающейся задержкой
                if (reconnectTimer) clearTimeout(reconnectTimer);
                let delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
                reconnectAttempts++;
                reconnectTimer = setTimeout(() => {
                    console.log(`🔄 Попытка переподключения ${reconnectAttempts}...`);
                    connect();
                }, delay);
            };
            
            ws.onerror = (err) => {
                console.error("WebSocket ошибка:", err);
                updateConnectionStatus("disconnected", "⚠️ Ошибка соединения");
            };
        } catch(err) {
            console.error("Ошибка создания WebSocket:", err);
            updateConnectionStatus("disconnected", "❌ Ошибка создания соединения");
        }
    }
    
    function sendMessage() {
        let inp = document.getElementById("messageInput");
        let txt = inp.value.trim();
        
        if (!txt) return;
        
        // Проверяем состояние WebSocket
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            addInfo("❌ Нет соединения с сервером. Подключаемся...");
            connect();
            return;
        }
        
        try {
            let message = {
                type: currentChat === "all" ? "public" : "private",
                text: txt
            };
            if (currentChat !== "all") {
                message.to = currentChat;
            }
            ws.send(JSON.stringify(message));
            addMsg(myName, txt, true, new Date().toLocaleTimeString());
            inp.value = "";
        } catch(err) {
            console.error("Ошибка отправки:", err);
            addInfo("❌ Ошибка отправки сообщения");
            connect();
        }
    }
    
    function sendTyping() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        if (currentChat !== "all") {
            try {
                ws.send(JSON.stringify({type: "typing", to: currentChat}));
            } catch(err) {
                console.error("Ошибка отправки статуса печати:", err);
            }
        }
    }
    
    function updateUsers(users) {
        let container = document.getElementById("usersList");
        container.innerHTML = '<div style="padding:12px 20px;color:#7e8c9e;cursor:pointer" onclick="selectChat(\'all\')">📢 Общий чат</div>';
        users.filter(u => u !== myName).forEach(u => {
            let div = document.createElement("div");
            div.className = "user-item" + (currentChat === u ? " active" : "");
            div.onclick = () => selectChat(u);
            div.innerHTML = `<div class="user-name-small">${escape(u)}</div>`;
            container.appendChild(div);
        });
    }
    
    function selectChat(chat) {
        currentChat = chat;
        document.getElementById("chatHeader").innerHTML = chat === "all" ? "📢 Общий чат" : `💬 ${chat}`;
        document.getElementById("messages").innerHTML = "";
        document.querySelectorAll(".user-item").forEach(el => el.classList.remove("active"));
    }
    
    function addMsg(from, text, self, time) {
        let div = document.createElement("div");
        div.className = "message " + (self || from === myName ? "self" : "other");
        div.innerHTML = (self || from === myName ? "" : `<b>${escape(from)}</b><br>`) + escape(text) + `<div class="message-info">${time || ""}</div>`;
        document.getElementById("messages").appendChild(div);
        div.scrollIntoView();
    }
    
    function addInfo(text) {
        let d = document.createElement("div");
        d.style.cssText = "text-align:center;color:#7e8c9e;font-size:12px;margin:5px 0";
        d.innerText = text;
        document.getElementById("messages").appendChild(d);
        setTimeout(() => d.remove(), 5000);
    }
    
    function showTyping(from) {
        let ind = document.getElementById("typingIndicator");
        ind.innerText = from + " печатает...";
        ind.style.display = "block";
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => ind.style.display = "none", 2000);
    }
    
    document.getElementById("messageInput").addEventListener("input", () => sendTyping());
    document.getElementById("messageInput").addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });
    
    function escape(s) {
        return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    
    // Запускаем подключение
    connect();
    
    // Периодическая проверка соединения (каждые 30 секунд)
    setInterval(() => {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            console.log("Проверка: соединение потеряно, переподключаемся...");
            connect();
        }
    }, 30000);
</script>
</body>
</html>
